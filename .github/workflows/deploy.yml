name: Deploy to VPS (Optimized via Docker Hub)

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  # ── Job 1: Test & Lint (Aapka purana step) ──
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

  # ── Job 2: Build & Push on GitHub (Zero load on VPS) ──
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod 
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/qkics_backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to VPS ──
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }} 
          envs: DOCKER_USERNAME,DOCKER_PASSWORD,DEPLOY_PATH
          script: |
            set -e
            cd $DEPLOY_PATH
            
            export DOCKER_USERNAME="${DOCKER_USERNAME}"
            export DOCKER_PASSWORD="${DOCKER_PASSWORD}"
            
            if [ -z "$DOCKER_PASSWORD" ]; then
              echo "❌ ERROR: DOCKER_PASSWORD is empty!"
              exit 1
            fi
            
            # Login to Docker
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            
            # Code pull for configs and entrypoint scripts
            git pull origin main
            
            echo "--- Pulling latest image ---"
            sudo docker compose -f docker-compose.prod.yml pull
            
            echo "--- Restarting containers ---"
            sudo docker compose -f docker-compose.prod.yml down
            sudo docker compose -f docker-compose.prod.yml up -d
            
            echo "--- Waiting for startup ---"
            sleep 30
            
            echo "--- Fixing permissions & Reloading Nginx ---"
            sudo chown -R www-data:www-data media staticfiles || true
            sudo systemctl reload nginx || true
            
            echo "--- Running Health Check ---"
            for i in $(seq 1 10); do
              echo "Health check attempt $i/10..."
              if curl -sf http://localhost:9000/admin/login/ > /dev/null; then
                echo "✅ Health check passed!"
                break
              fi
              if [ $i -eq 10 ]; then
                echo "❌ Health check failed after 10 attempts"
                sudo docker compose -f docker-compose.prod.yml logs --tail=50 django
                exit 1
              fi
              sleep 10
            done
            
            echo "✅ Deployment Successful! Cleaning up..."
            sudo docker image prune -f