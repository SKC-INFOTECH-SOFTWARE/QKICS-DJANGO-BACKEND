name: Deploy to VPS (Optimized via Docker Hub)

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:

  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/qkics_backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DEPLOY_PATH:     ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          envs:     DOCKER_USERNAME,DOCKER_PASSWORD,DEPLOY_PATH
          script: |
            set -e
            cd $DEPLOY_PATH

            if [ -z "$DOCKER_PASSWORD" ]; then
              echo "ERROR: DOCKER_PASSWORD is empty!"
              exit 1
            fi

            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

            git pull origin main

            mkdir -p livekit staticfiles media recordings

            echo "--- Pulling latest image ---"
            sudo docker compose -f docker-compose.prod.yml pull

            echo "--- Restarting containers ---"
            sudo docker compose -f docker-compose.prod.yml down
            sudo docker compose -f docker-compose.prod.yml up -d

            echo "--- Waiting 45s ---"
            sleep 45

            sudo chown -R www-data:www-data staticfiles media || true
            sudo chmod -R 755 recordings || true

            echo "--- Health check ---"
            for i in $(seq 1 12); do
              echo "Attempt $i/12..."
              if curl -sf http://localhost:9000/admin/login/ > /dev/null; then
                echo "Health check passed!"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "Health check FAILED"
                sudo docker compose -f docker-compose.prod.yml logs --tail=50 django
                exit 1
              fi
              sleep 10
            done

            echo "--- Setup cron job ---"
            CRON_JOB="0 2 * * * cd $DEPLOY_PATH && docker compose -f docker-compose.prod.yml exec -T django python manage.py cleanup_recordings >> /var/log/qkics_cleanup.log 2>&1"
            (crontab -l 2>/dev/null | grep -q "cleanup_recordings") || \
              (crontab -l 2>/dev/null; echo "$CRON_JOB") | crontab -
            echo "Cron job set."

            sudo docker image prune -f
            echo "Deployment complete!"
