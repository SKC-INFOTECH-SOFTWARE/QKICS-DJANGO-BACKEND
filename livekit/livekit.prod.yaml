port: 7880

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: true
#   # TCP fallback jab UDP block ho (corporate firewalls, strict NAT)
#   allow_tcp_fallback: true

# # ─── Embedded TURN Server ────────────────────────────────────────────────────
# # TURN relay: Jab direct UDP path fail ho (symmetric NAT, mobile networks,
# # corporate firewalls) tab LiveKit khud relay karta hai — alag coturn nahi chahiye.
# #
# # Firewall mein ye ports open karo:
# #   - 3478/UDP  : STUN/TURN UDP (main relay port)
# #   - 443/UDP   : TURN UDP (firewall-friendly alternate — note: 443/TCP nginx ka hai,
# #                           443/UDP alag hota hai, conflict nahi)
# #   - 5349/TCP  : TURN/TLS (TLS cert lagne ke baad enable karo)
# #   - 30000-40000/UDP : TURN relay range (TURN internal traffic)
# turn:
#   enabled: true
#   # UDP TURN — works for ~85% of. users, no TLS cert needed
#   udp_port: 3478
#   # Relay port range — TURN in-server relay traffic ke liye
#   relay_range_start: 30000
#   relay_range_end: 40000
#   # ── TURN/TLS (optional but recommended for corporate firewall compat) ──────
#   # Jab turn.matchb.online subdomain + Let's Encrypt cert ready ho tab uncomment:
#   # domain: turn.matchb.online
#   # tls_port: 5349
#   # cert_file: /etc/livekit/turn.crt
#   # key_file: /etc/livekit/turn.key
#   # external_tls: false

redis:
  address: 127.0.0.1:6380

keys:
  18ca5e94d6f9d3af05323e9e0aa5a294: 99ced558616d7f89507f4a4c5dff0571

webhook:
  api_key: 18ca5e94d6f9d3af05323e9e0aa5a294
  urls:
    - https://qkicsbackend.matchb.online/api/v1/calls/livekit/webhook/

room:
  auto_create: true
  empty_timeout: 600    # 10 min — keep room open after last participant leaves
  departure_timeout: 300 # 5 min — time for participant to reconnect after drop

logging:
  level: info

